<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Flappy Bird</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#4ec0ca"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #4ec0ca;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Arial', sans-serif;
    overflow: hidden;
    user-select: none;
}
canvas {
    border: 4px solid #543847;
    border-radius: 8px;
    cursor: pointer;
    image-rendering: pixelated;
}
</style>
</head>
<body>
<canvas id="game" width="400" height="600"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Game state
let gameState = 'menu'; // menu, playing, dead
let score = 0;
let bestScore = parseInt(localStorage.getItem('flappy_best') || '0');
let frameCount = 0;

// Bird
const bird = {
    x: 80,
    y: 300,
    width: 34,
    height: 24,
    velocity: 0,
    gravity: 0.5,
    jump: -8,
    rotation: 0,
    flapFrame: 0,
};

// Pipes
let pipes = [];
const pipeWidth = 52;
const pipeGap = 140;
const pipeSpeed = 2.5;
let pipeTimer = 0;
const pipeInterval = 90;

// Ground
const groundY = 540;
let groundX = 0;

// Colors
const colors = {
    sky: '#4ec0ca',
    skyBottom: '#e8fcf8',
    ground: '#ded895',
    groundDark: '#d1b355',
    groundStripe: '#c5a83b',
    pipeGreen: '#73bf2e',
    pipeGreenDark: '#558b20',
    pipeGreenLight: '#8ed349',
    pipeBorder: '#543847',
    birdYellow: '#f8c53a',
    birdOrange: '#e07020',
    birdWhite: '#ffffff',
    birdEye: '#000000',
    birdBeak: '#eb4f3d',
    textWhite: '#ffffff',
    textBorder: '#543847',
};

function resetGame() {
    bird.y = 300;
    bird.velocity = 0;
    bird.rotation = 0;
    pipes = [];
    pipeTimer = 0;
    score = 0;
    frameCount = 0;
}

function flap() {
    if (gameState === 'menu') {
        gameState = 'playing';
        resetGame();
        bird.velocity = bird.jump;
    } else if (gameState === 'playing') {
        bird.velocity = bird.jump;
    } else if (gameState === 'dead') {
        if (frameCount > 20) {
            gameState = 'menu';
        }
    }
}

// Input
canvas.addEventListener('click', flap);
document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowUp') {
        e.preventDefault();
        flap();
    }
});
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); flap(); });

function addPipe() {
    const minY = 80;
    const maxY = groundY - pipeGap - 80;
    const topHeight = minY + Math.random() * (maxY - minY);
    pipes.push({
        x: canvas.width,
        topHeight: topHeight,
        scored: false,
    });
}

function update() {
    frameCount++;

    if (gameState === 'playing') {
        // Bird physics
        bird.velocity += bird.gravity;
        bird.y += bird.velocity;
        bird.flapFrame = (bird.flapFrame + 0.3) % 3;

        // Rotation based on velocity
        bird.rotation = Math.min(Math.max(bird.velocity * 3, -30), 90);

        // Pipes
        pipeTimer++;
        if (pipeTimer >= pipeInterval) {
            addPipe();
            pipeTimer = 0;
        }

        for (let i = pipes.length - 1; i >= 0; i--) {
            pipes[i].x -= pipeSpeed;

            // Score
            if (!pipes[i].scored && pipes[i].x + pipeWidth < bird.x) {
                pipes[i].scored = true;
                score++;
            }

            // Remove off-screen pipes
            if (pipes[i].x + pipeWidth < -10) {
                pipes.splice(i, 1);
            }
        }

        // Collision detection
        // Ground
        if (bird.y + bird.height >= groundY) {
            bird.y = groundY - bird.height;
            die();
        }
        // Ceiling
        if (bird.y < 0) {
            bird.y = 0;
            bird.velocity = 0;
        }
        // Pipes
        for (const pipe of pipes) {
            const birdLeft = bird.x - bird.width / 2 + 4;
            const birdRight = bird.x + bird.width / 2 - 4;
            const birdTop = bird.y - bird.height / 2 + 4;
            const birdBottom = bird.y + bird.height / 2 - 4;

            if (birdRight > pipe.x && birdLeft < pipe.x + pipeWidth) {
                if (birdTop < pipe.topHeight || birdBottom > pipe.topHeight + pipeGap) {
                    die();
                }
            }
        }

        // Ground scroll
        groundX = (groundX - pipeSpeed) % 24;
    }

    if (gameState === 'menu') {
        // Bob bird on menu
        bird.y = 300 + Math.sin(frameCount * 0.05) * 15;
        groundX = (groundX - 1) % 24;
    }
}

function die() {
    gameState = 'dead';
    frameCount = 0;
    if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('flappy_best', bestScore.toString());
    }
}

// Drawing functions
function drawSky() {
    const gradient = ctx.createLinearGradient(0, 0, 0, groundY);
    gradient.addColorStop(0, colors.sky);
    gradient.addColorStop(1, colors.skyBottom);
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, canvas.width, groundY);

    // Clouds
    ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
    const cloudY1 = 80 + Math.sin(frameCount * 0.005) * 5;
    const cloudY2 = 160 + Math.cos(frameCount * 0.007) * 3;
    drawCloud(50 - (frameCount * 0.3 % 500), cloudY1, 1);
    drawCloud(280 - (frameCount * 0.2 % 500), cloudY2, 0.7);
    drawCloud(450 - (frameCount * 0.25 % 600), 120, 0.85);
}

function drawCloud(x, y, scale) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(scale, scale);
    ctx.beginPath();
    ctx.arc(0, 0, 30, 0, Math.PI * 2);
    ctx.arc(30, -10, 25, 0, Math.PI * 2);
    ctx.arc(55, 0, 20, 0, Math.PI * 2);
    ctx.arc(25, 10, 22, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
}

function drawGround() {
    // Main ground
    ctx.fillStyle = colors.ground;
    ctx.fillRect(0, groundY, canvas.width, 60);

    // Top stripe
    ctx.fillStyle = colors.groundStripe;
    ctx.fillRect(0, groundY, canvas.width, 4);

    // Ground pattern
    ctx.fillStyle = colors.groundDark;
    for (let x = groundX; x < canvas.width + 24; x += 24) {
        ctx.fillRect(x, groundY + 8, 12, 4);
        ctx.fillRect(x + 12, groundY + 20, 12, 4);
    }
}

function drawPipe(pipe) {
    const capHeight = 26;
    const capOverhang = 4;

    // Top pipe body
    ctx.fillStyle = colors.pipeGreen;
    ctx.fillRect(pipe.x, 0, pipeWidth, pipe.topHeight - capHeight);

    // Top pipe cap
    ctx.fillStyle = colors.pipeGreenDark;
    ctx.fillRect(pipe.x - capOverhang, pipe.topHeight - capHeight, pipeWidth + capOverhang * 2, capHeight);

    // Top pipe highlight
    ctx.fillStyle = colors.pipeGreenLight;
    ctx.fillRect(pipe.x + 4, 0, 8, pipe.topHeight - capHeight);
    ctx.fillRect(pipe.x - capOverhang + 3, pipe.topHeight - capHeight + 3, 8, capHeight - 6);

    // Top pipe border
    ctx.strokeStyle = colors.pipeBorder;
    ctx.lineWidth = 2;
    ctx.strokeRect(pipe.x, 0, pipeWidth, pipe.topHeight - capHeight);
    ctx.strokeRect(pipe.x - capOverhang, pipe.topHeight - capHeight, pipeWidth + capOverhang * 2, capHeight);

    // Bottom pipe
    const bottomY = pipe.topHeight + pipeGap;

    // Bottom pipe body
    ctx.fillStyle = colors.pipeGreen;
    ctx.fillRect(pipe.x, bottomY + capHeight, pipeWidth, groundY - bottomY - capHeight);

    // Bottom pipe cap
    ctx.fillStyle = colors.pipeGreenDark;
    ctx.fillRect(pipe.x - capOverhang, bottomY, pipeWidth + capOverhang * 2, capHeight);

    // Bottom pipe highlight
    ctx.fillStyle = colors.pipeGreenLight;
    ctx.fillRect(pipe.x + 4, bottomY + capHeight, 8, groundY - bottomY - capHeight);
    ctx.fillRect(pipe.x - capOverhang + 3, bottomY + 3, 8, capHeight - 6);

    // Bottom pipe border
    ctx.strokeRect(pipe.x, bottomY + capHeight, pipeWidth, groundY - bottomY - capHeight);
    ctx.strokeRect(pipe.x - capOverhang, bottomY, pipeWidth + capOverhang * 2, capHeight);
}

function drawBird() {
    ctx.save();
    ctx.translate(bird.x, bird.y);
    ctx.rotate(bird.rotation * Math.PI / 180);

    // Wing
    const wingY = Math.floor(bird.flapFrame) === 1 ? -6 : Math.floor(bird.flapFrame) === 2 ? 4 : 0;
    ctx.fillStyle = colors.birdOrange;
    ctx.beginPath();
    ctx.ellipse(-4, wingY, 10, 6, -0.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = colors.pipeBorder;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Body
    ctx.fillStyle = colors.birdYellow;
    ctx.beginPath();
    ctx.ellipse(0, 0, bird.width / 2, bird.height / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = colors.pipeBorder;
    ctx.lineWidth = 2;
    ctx.stroke();

    // Belly
    ctx.fillStyle = '#f9e697';
    ctx.beginPath();
    ctx.ellipse(2, 4, 10, 7, 0, 0, Math.PI * 2);
    ctx.fill();

    // Eye white
    ctx.fillStyle = colors.birdWhite;
    ctx.beginPath();
    ctx.arc(8, -5, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = colors.pipeBorder;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Eye pupil
    ctx.fillStyle = colors.birdEye;
    ctx.beginPath();
    ctx.arc(10, -5, 3.5, 0, Math.PI * 2);
    ctx.fill();

    // Eye highlight
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(11, -6.5, 1.5, 0, Math.PI * 2);
    ctx.fill();

    // Beak
    ctx.fillStyle = colors.birdBeak;
    ctx.beginPath();
    ctx.moveTo(14, -1);
    ctx.lineTo(24, 2);
    ctx.lineTo(14, 5);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = colors.pipeBorder;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.restore();
}

function drawScore() {
    ctx.save();
    ctx.font = 'bold 48px Arial';
    ctx.textAlign = 'center';
    ctx.lineWidth = 4;
    ctx.strokeStyle = colors.textBorder;
    ctx.strokeText(score, canvas.width / 2, 60);
    ctx.fillStyle = colors.textWhite;
    ctx.fillText(score, canvas.width / 2, 60);
    ctx.restore();
}

function drawMenu() {
    // Title
    ctx.save();
    ctx.font = 'bold 52px Arial';
    ctx.textAlign = 'center';
    ctx.lineWidth = 5;
    ctx.strokeStyle = colors.textBorder;
    ctx.strokeText('Flappy Bird', canvas.width / 2, 180);
    ctx.fillStyle = colors.textWhite;
    ctx.fillText('Flappy Bird', canvas.width / 2, 180);

    // Subtitle
    ctx.font = 'bold 20px Arial';
    ctx.lineWidth = 3;
    ctx.strokeStyle = colors.textBorder;
    const msg = 'Click or press Space to play';
    ctx.strokeText(msg, canvas.width / 2, 440);
    ctx.fillStyle = colors.textWhite;
    ctx.fillText(msg, canvas.width / 2, 440);

    // Best score
    if (bestScore > 0) {
        ctx.font = 'bold 18px Arial';
        ctx.strokeText(`Best: ${bestScore}`, canvas.width / 2, 480);
        ctx.fillText(`Best: ${bestScore}`, canvas.width / 2, 480);
    }
    ctx.restore();
}

function drawGameOver() {
    // Overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.textAlign = 'center';

    // Game Over
    ctx.font = 'bold 48px Arial';
    ctx.lineWidth = 5;
    ctx.strokeStyle = colors.textBorder;
    ctx.strokeText('Game Over', canvas.width / 2, 220);
    ctx.fillStyle = '#e04040';
    ctx.fillText('Game Over', canvas.width / 2, 220);

    // Score
    ctx.font = 'bold 32px Arial';
    ctx.lineWidth = 4;
    ctx.strokeStyle = colors.textBorder;
    ctx.strokeText(`Score: ${score}`, canvas.width / 2, 290);
    ctx.fillStyle = colors.textWhite;
    ctx.fillText(`Score: ${score}`, canvas.width / 2, 290);

    // Best
    ctx.font = 'bold 24px Arial';
    ctx.strokeText(`Best: ${bestScore}`, canvas.width / 2, 340);
    ctx.fillStyle = '#f8c53a';
    ctx.fillText(`Best: ${bestScore}`, canvas.width / 2, 340);

    // Restart
    if (frameCount > 20) {
        ctx.font = 'bold 18px Arial';
        ctx.lineWidth = 3;
        ctx.strokeStyle = colors.textBorder;
        ctx.strokeText('Click to restart', canvas.width / 2, 400);
        ctx.fillStyle = colors.textWhite;
        ctx.fillText('Click to restart', canvas.width / 2, 400);
    }

    ctx.restore();
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawSky();

    // Draw pipes behind bird
    for (const pipe of pipes) {
        drawPipe(pipe);
    }

    drawGround();
    drawBird();

    if (gameState === 'playing') {
        drawScore();
    } else if (gameState === 'menu') {
        drawMenu();
    } else if (gameState === 'dead') {
        drawScore();
        drawGameOver();
    }
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
